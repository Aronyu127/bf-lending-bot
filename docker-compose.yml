services:
  app:
    build: .
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      PORT: "8501"
      STREAMLIT_SERVER_PORT: "8501"
      PYTHONUNBUFFERED: "1"
    restart: unless-stopped
    # Local dev only: mount repo so code changes apply without rebuild.
    # Dependencies still come from the image; after `requirements.txt` changes, run `docker compose build` once.
    # volumes:
    #   - .:/app
